services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: mm_timescaledb
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mm}
      POSTGRES_DB: ${POSTGRES_DB:-mm_monitoring}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mm} -d ${POSTGRES_DB:-mm_monitoring}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
